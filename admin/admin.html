<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cocina — Red e internet</title>
  <style>
    :root {
      --bg: #0f1117; --bg2: #171a22; --bg3: #1e2230;
      --text: #e8eaef; --muted: #8b919e; --accent: #6c8cff;
      --line: #2a3040; --green: #3ecf8e; --red: #f07178;
      --sans: system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.5; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px 64px; }
    h1 { margin: 0 0 8px; font-size: 26px; }
    .lead { color: var(--muted); margin-bottom: 28px; }
    .card { background: var(--bg2); border: 1px solid var(--line); border-radius: 10px; padding: 24px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    label.inline { display: flex; align-items: center; gap: 8px; }
    label.inline input { width: auto; margin: 0; }
    input[type="text"], input[type="url"], input[type="password"] {
      width: 100%; margin-top: 6px; padding: 10px 12px;
      background: var(--bg3); border: 1px solid var(--line); border-radius: 8px;
      color: var(--text); font-size: 14px;
    }
    .modes { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .mode {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px; border: 1px solid var(--line); border-radius: 8px; cursor: pointer;
      background: var(--bg3);
    }
    .mode:has(input:checked) { border-color: var(--accent); }
    .mode input { width: auto; margin: 4px 0 0; }
    .mode-title { font-weight: 600; }
    .mode-desc { font-size: 13px; color: var(--muted); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    button {
      border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px;
      cursor: pointer; font-family: inherit;
    }
    .primary { background: var(--accent); color: #fff; font-weight: 600; }
    .ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
    .msg { font-size: 13px; margin-top: 12px; }
    .ok { color: var(--green); }
    .err { color: var(--red); }
    .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
    details { margin-top: 16px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Conexión a internet</h1>
    <p class="lead">Configurá la URL pública del servidor de chat.</p>

    <div class="card">
      <div class="modes">
        <label class="mode">
          <input type="radio" name="mode" value="local" />
          <div>
            <div class="mode-title">Solo red local</div>
            <div class="mode-desc">LAN o localhost.</div>
          </div>
        </label>
        <label class="mode">
          <input type="radio" name="mode" value="public" />
          <div>
            <div class="mode-title">Servidor público (VM)</div>
            <div class="mode-desc">AWS, GCP, Azure con DNS y TLS.</div>
          </div>
        </label>
        <label class="mode">
          <input type="radio" name="mode" value="tunnel" />
          <div>
            <div class="mode-title">Cloudflare Tunnel</div>
            <div class="mode-desc">PC local sin abrir puertos.</div>
          </div>
        </label>
      </div>

      <label>
        URL pública del servidor
        <input id="publicBase" type="url" placeholder="https://chat.tudominio.com" />
        <span class="hint">WebSocket: <code id="wsPreview">—</code></span>
      </label>

      <details>
        <summary>Cocina Identity (opcional)</summary>
        <label>
          URL pública de Identity
          <input id="identityUrl" type="url" placeholder="https://identity.tudominio.com" />
        </label>
        <label class="inline">
          <input id="syncIdentity" type="checkbox" />
          Sincronizar con Identity al guardar
        </label>
      </details>

      <details id="tokenSection">
        <summary>Token de setup (acceso remoto)</summary>
        <label>
          COCINA_SETUP_TOKEN
          <input id="setupToken" type="password" placeholder="Solo si accedés por dominio público" />
          <span class="hint">Desde localhost no hace falta. Se recuerda en este navegador.</span>
        </label>
      </details>

      <div class="actions">
        <button type="button" class="primary" id="btnSave">Guardar</button>
        <button type="button" class="ghost" id="btnTest">Probar conexión</button>
      </div>
      <div id="status" class="msg"></div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = 'cocina_admin_setup_token'
    const $ = (id) => document.getElementById(id)
    const status = (text, ok) => {
      $('status').textContent = text
      $('status').className = 'msg ' + (ok ? 'ok' : 'err')
    }

    const savedToken = sessionStorage.getItem(TOKEN_KEY)
    if (savedToken) $('setupToken').value = savedToken

    function headers() {
      const h = { 'Content-Type': 'application/json' }
      const t = $('setupToken').value.trim()
      if (t) h['X-Setup-Token'] = t
      return h
    }

    function payload() {
      return {
        exposure_mode: document.querySelector('input[name="mode"]:checked')?.value || 'local',
        public_base_url: $('publicBase').value.trim(),
        identity_public_url: $('identityUrl').value.trim(),
        sync_identity: $('syncIdentity').checked,
      }
    }

    function applySettings(s) {
      document.querySelector(`input[name="mode"][value="${s.exposure_mode}"]`)?.click()
      $('publicBase').value = s.public_base_url || ''
      $('identityUrl').value = s.identity_public_url || ''
      $('wsPreview').textContent = s.public_ws_url || '—'
    }

    async function load() {
      try {
        const res = await fetch('/api/v1/admin/network')
        const body = await res.json()
        if (body.data) applySettings(body.data)
      } catch (e) {
        status('No se pudo cargar la configuración', false)
      }
    }

    $('publicBase').addEventListener('input', () => {
      const v = $('publicBase').value.trim()
      if (!v) { $('wsPreview').textContent = '—'; return }
      $('wsPreview').textContent = v.startsWith('https://')
        ? 'wss://' + v.replace(/^https:\/\//, '')
        : v.startsWith('http://') ? 'ws://' + v.replace(/^http:\/\//, '') : v
    })

    $('btnTest').addEventListener('click', async () => {
      status('Probando…', true)
      try {
        const res = await fetch('/api/v1/admin/network/test', {
          method: 'POST', headers: headers(), body: JSON.stringify(payload()),
        })
        const body = await res.json()
        if (!res.ok) throw new Error(body.error?.message || res.statusText)
        const t = body.data
        const idPart = t.identity_reachable ? ' · Identity: OK' : (t.identity_error ? ' · Identity: ' + t.identity_error : '')
        status(
          'Servidor: ' + (t.server_reachable ? 'OK' : 'FAIL' + (t.server_error ? ' (' + t.server_error + ')' : '')) + idPart,
          t.server_reachable,
        )
      } catch (e) {
        status(e.message || 'Error en prueba', false)
      }
    })

    $('btnSave').addEventListener('click', async () => {
      status('Guardando…', true)
      try {
        const res = await fetch('/api/v1/admin/network', {
          method: 'POST', headers: headers(), body: JSON.stringify(payload()),
        })
        const body = await res.json()
        if (!res.ok) {
          if (res.status === 403) {
            $('tokenSection').open = true
            throw new Error(body.error?.message + ' — ingresá COCINA_SETUP_TOKEN si accedés por dominio público.')
          }
          throw new Error(body.error?.message || res.statusText)
        }
        const t = $('setupToken').value.trim()
        if (t) sessionStorage.setItem(TOKEN_KEY, t)
        applySettings(body.data)
        let msg = 'Configuración guardada.'
        if (body.data.identity_sync_ok) msg += ' Sincronizado con Identity.'
        else if (body.data.identity_sync_error) msg += ' Identity: ' + body.data.identity_sync_error
        status(msg, true)
      } catch (e) {
        status(e.message || 'No se pudo guardar', false)
      }
    })

    load()
  </script>
</body>
</html>
